<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joining Deals & Crumpets...</title>
  <meta http-equiv="refresh" content="0; url=https://www.facebook.com/groups/dealsandcrumpets" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #00C9A7;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;

      padding: 24px;

    p  { font-size: 16px; opacity: 0.85; margin-bottom: 28px; }
    a  {
      display: inline-block;

<body>
  <h1>Taking you to the group...</h1>
  <p>If you are not redirected automatically, tap the button below.</p>

  <script>
    // Try multiple methods to ensure navigation works in all browsers including FB in-app
    try { window.location.replace('https://www.facebook.com/groups/dealsandcrumpets'); } catch(e) {}
    setTimeout(function() {
      try { window.location.href = 'https://www.facebook.com/groups/dealsandcrumpets'; } catch(e) {}
